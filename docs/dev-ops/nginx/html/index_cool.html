<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Auto Agent 智能体 - Pro Edition</title>
    <script src="js/3.4.17.js"></script>
    <script src="js/marked.min.js"></script>
    <script src="js/purify.min.js"></script>
    <script src="js/highlight.min.js"></script>
    <link rel="stylesheet" href="css/github.min.css">
    <link rel="stylesheet" href="css/css2.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {sans: ['Segoe UI', 'Microsoft YaHei', 'sans-serif']},
                    colors: {
                        primary: {
                            50: '#f2f7f6',
                            100: '#dbeae6',
                            200: '#bdd7d0',
                            300: '#8fb8ac',
                            400: '#5d9787',
                            500: '#3e7f70',
                            600: '#2e6558',
                            700: '#244f46',
                            800: '#1d403a',
                            900: '#17342f'
                        }
                    },
                    boxShadow: {'glass': '0 18px 40px -28px rgba(29, 53, 47, 0.35)'}
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-base: #ffffff;
            --bg-warm: #f7f8fa;
            --bg-paper: rgba(255, 255, 255, 0.98);
            --bg-panel: rgba(255, 255, 255, 0.96);
            --line-soft: rgba(15, 23, 42, 0.08);
            --line-strong: rgba(15, 23, 42, 0.12);
            --ink-main: #17212b;
            --ink-soft: #5f6b7a;
            --accent: #4f7cff;
            --accent-deep: #3155cc;
            --accent-glow: rgba(79, 124, 255, 0.14);
            --rose: #dc6b4d;
            --gold: #b78a3d;
            --shadow-xl: 0 24px 48px -36px rgba(15, 23, 42, 0.18);
            --shadow-md: 0 14px 28px -24px rgba(15, 23, 42, 0.12);
            --radius-xl: 28px;
            --radius-lg: 20px;
        }

        body {
            color: var(--ink-main);
            background: #ffffff;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: none;
            mask-image: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 22px;
            pointer-events: none;
            border: none;
            border-radius: 30px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(15, 23, 42, 0.07);
            box-shadow: var(--shadow-md);
        }

        nav.glass-panel {
            margin: 16px 16px 0;
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.96);
            border-color: rgba(15, 23, 42, 0.06);
        }

        #sidebar {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(15, 23, 42, 0.07);
        }

        #chatList li {
            border-radius: 18px !important;
            border-color: rgba(15, 23, 42, 0.07) !important;
            background: #ffffff !important;
            box-shadow: 0 10px 18px -18px rgba(15, 23, 42, 0.08);
        }

        #chatList li:hover {
            border-color: rgba(79, 124, 255, 0.2) !important;
            background: #fbfcff !important;
        }

        #sidebar > div:first-child,
        #sidebar > div:last-child {
            background: #fbfcfe;
            border-color: rgba(15, 23, 42, 0.06);
        }

        #chatList {
            background: #f8fafc;
        }

        .flex-1.flex.flex-col.overflow-hidden.glass-panel.rounded-2xl.shadow-xl.relative {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(15, 23, 42, 0.07);
        }

        #thinkingMessages,
        #resultMessages {
            background: #ffffff;
        }

        #thinkingMessages {
            box-shadow: inset -1px 0 0 rgba(15, 23, 42, 0.06);
        }

        #resultMessages {
            background: #ffffff;
        }

        #thinkingMessages > div:first-child .flex-1,
        #resultMessages > div:first-child .flex-1 {
            background: #ffffff !important;
            border-color: rgba(15, 23, 42, 0.07) !important;
            border-radius: 22px !important;
        }

        #messageInput,
        #uploadRagTag,
        #gitRepoUrl,
        #gitUserName,
        #gitToken,
        #exampleSelect,
        #aiAgentSelect,
        #maxStepSelect,
        #ragSelect {
            background: #ffffff !important;
            border-color: rgba(15, 23, 42, 0.1) !important;
            color: var(--ink-main) !important;
            box-shadow: 0 8px 16px -18px rgba(15, 23, 42, 0.08);
        }

        #messageInput {
            border-width: 1px !important;
            min-height: 48px;
            border-radius: 18px !important;
            background: #ffffff !important;
        }

        #messageInput::placeholder {
            color: #8a928c;
        }

        #sendBtn {
            min-width: 122px;
            border-radius: 22px !important;
            background: #3155cc !important;
            box-shadow: 0 16px 24px -20px rgba(49, 85, 204, 0.45);
        }

        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 26px -20px rgba(49, 85, 204, 0.52);
        }

        #panel-file button,
        #panel-git button,
        nav button {
            border-radius: 18px !important;
        }

        #ragModalContent {
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #ffffff;
        }

        .stage-card-shell {
            position: relative;
            overflow: hidden;
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.08);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
        }

        .stage-card-shell::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 6px;
            background: linear-gradient(180deg, rgba(62, 127, 112, 0.9) 0%, rgba(183, 141, 82, 0.8) 100%);
        }

        .stage-card-topbar {
            position: relative;
            margin: -16px -16px 18px -16px;
            padding: 16px 18px 14px 22px;
            background: #ffffff;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        }

        .stage-card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .stage-card-chipline {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            flex: 0 1 auto;
            min-width: 0;
            min-height: 56px;
            padding: 6px;
            border-radius: 24px;
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.07);
            box-shadow: none;
        }

        .stage-indicator,
        .sub-type-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08px;
        }

        .stage-indicator {
            padding: 10px 16px;
            border: 1px solid transparent;
            box-shadow: none;
        }

        .stage-indicator-icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.85);
            font-size: 10px;
            line-height: 1;
        }

        .stage-analysis {
            background: #eef4ff;
            color: #3455c5;
        }

        .stage-execution {
            background: #fff2ec;
            color: #cb5d38;
        }

        .stage-supervision {
            background: #fff7e8;
            color: #9a6f1f;
        }

        .stage-summary {
            background: #edf8f2;
            color: #2d7a4f;
        }

        .stage-error {
            background: #fff0ee;
            color: #c6473d;
        }

        .stage-token {
            background: #eff3ff;
            color: #4a63c8;
        }

        .sub-type-indicator {
            padding: 10px 14px;
            background: #f8fafc;
            color: #727973;
            border: 1px solid rgba(15, 23, 42, 0.07);
            box-shadow: none;
        }

        .sub-type-indicator::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: currentColor;
            opacity: 0.45;
        }

        .stage-subcards {
            display: grid;
            gap: 12px;
            margin-top: 4px;
        }

        .stage-subcard {
            position: relative;
            background: #fbfcfe;
            border: 1px solid rgba(15, 23, 42, 0.06);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            box-shadow: none;
        }

        .stage-subcard-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.24px;
            text-transform: uppercase;
            color: #66706a;
        }

        .stage-subcard-title::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #a3afc2;
        }

        .token-usage-indicator {
            display: inline-flex;
            align-items: stretch;
            flex: 0 0 auto;
            gap: 0;
            overflow: hidden;
            min-height: 56px;
            border-radius: 24px;
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: none;
        }

        .token-usage-indicator .token-item {
            min-width: 98px;
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            gap: 4px;
            padding: 10px 16px 11px;
            border-right: 1px solid rgba(15, 23, 42, 0.07);
            line-height: 1;
        }

        .token-usage-indicator .token-item:last-child {
            border-right: none;
        }

        .token-usage-indicator .token-label {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.85px;
            opacity: 0.62;
        }

        .token-usage-indicator .token-value {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .token-usage-indicator .token-in {
            background: #eef4ff;
            color: #3455c5;
        }

        .token-usage-indicator .token-out {
            background: #fff2ec;
            color: #cb5d38;
        }

        .token-usage-indicator .token-total {
            background: #edf8f2;
            color: #2d7a4f;
            position: relative;
        }

        .token-usage-indicator .token-total::after {
            content: "";
            position: absolute;
            top: 11px;
            right: 11px;
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: rgba(45, 122, 79, 0.18);
        }

        .token-usage-indicator .token-na {
            min-width: auto;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            color: #6b7280;
        }

        .token-usage-indicator .token-na::before {
            content: "!";
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: rgba(107, 114, 128, 0.1);
            font-size: 10px;
            font-weight: 800;
        }

        .stage-card-shell.stage-analysis-shell::before {
            background: #4f7cff;
        }

        .stage-card-shell.stage-analysis-shell .stage-card-topbar {
            background: #ffffff;
        }

        .stage-card-shell.stage-execution-shell::before {
            background: #dc6b4d;
        }

        .stage-card-shell.stage-execution-shell .stage-card-topbar {
            background: #ffffff;
        }

        .stage-card-shell.stage-supervision-shell::before {
            background: #b78a3d;
        }

        .stage-card-shell.stage-supervision-shell .stage-card-topbar {
            background: #ffffff;
        }

        .stage-card-shell.stage-summary-shell::before {
            background: #3da56d;
        }

        .stage-card-shell.stage-summary-shell .stage-card-topbar {
            background: #ffffff;
        }

        .stage-card-shell.stage-error-shell::before {
            background: #e05252;
        }

        .stage-card-shell.stage-error-shell .stage-card-topbar {
            background: #ffffff;
        }

        .stage-card-shell.stage-token-shell::before {
            background: #6f7cf6;
        }

        .stage-card-shell.stage-token-shell .stage-card-topbar {
            background: #ffffff;
        }

        .stage-total-card .stage-subcards {
            display: none;
        }

        .stage-total-card .stage-card-shell {
            min-height: 0;
            background: #ffffff;
        }

        .stage-total-card .stage-card-topbar {
            margin-bottom: 0;
            padding-bottom: 16px;
            border-bottom: none;
        }

        .stage-total-card .stage-card-chipline {
            background: #ffffff;
        }

        .stage-total-card .token-usage-indicator {
            background: #ffffff;
        }

        .stage-avatar {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #ffffff;
            font-size: 12px;
            font-weight: 800;
            box-shadow: none;
        }

        .stage-avatar-analysis {
            background: #4f7cff;
        }

        .stage-avatar-execution {
            background: #dc6b4d;
        }

        .stage-avatar-supervision {
            background: #b78a3d;
        }

        .stage-avatar-summary {
            background: #3da56d;
        }

        .stage-avatar-error {
            background: #e05252;
        }

        .stage-avatar-token {
            background: #6f7cf6;
        }

        .markdown-content {
            margin-top: 4px;
            line-height: 1.8;
            color: var(--ink-soft);
        }

        .markdown-content p {
            margin-bottom: 0.55em;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            font-family: "Georgia", "Times New Roman", serif;
            font-weight: 700;
            color: var(--ink-main);
            margin-top: 1em;
            margin-bottom: 0.5em;
        }

        .markdown-content pre {
            background: #243a36;
            color: #f8f6f1;
            border-radius: 14px;
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .markdown-content code {
            font-family: Consolas, "Courier New", monospace;
            font-size: 0.9em;
            background: rgba(58, 89, 79, 0.08);
            padding: 2px 5px;
            border-radius: 6px;
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
        }

        .markdown-content ul, .markdown-content ol {
            padding-left: 1.5em;
            margin-bottom: 0.5em;
        }

        .markdown-content li {
            margin-bottom: 0.25em;
            list-style-type: disc;
        }

        @keyframes messageFadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            animation: messageFadeInUp 0.34s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(62, 127, 112, 0.45);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(62, 127, 112, 0);
            }
            100% {
                transform: scale(0.8);
                box-shadow: 0 0 0 0 rgba(62, 127, 112, 0);
            }
        }

        .status-dot {
            animation: pulse-ring 2s infinite;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(108, 96, 80, 0.24);
            border-radius: 999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(83, 111, 103, 0.38);
        }

        .modal-enter {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-leave {
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 1280px) {
            nav.glass-panel {
                margin: 10px 10px 0;
            }

            body::after {
                inset: 12px;
            }

            .stage-card-meta {
                flex-direction: column;
                align-items: stretch;
            }

            .token-usage-indicator {
                width: 100%;
                flex-wrap: wrap;
            }

            .token-usage-indicator .token-item {
                min-width: calc(50% - 1px);
            }

            .stage-card-chipline {
                width: 100%;
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col font-sans overflow-hidden">
<nav class="glass-panel px-6 py-4 flex items-center justify-between shadow-glass sticky top-0 z-30">
    <div class="flex items-center gap-4">
        <div class="w-11 h-11 bg-gradient-to-br from-primary-500 to-primary-700 rounded-[18px] flex items-center justify-center shadow-lg transform transition hover:scale-105">
            <span class="text-white font-bold text-xl">🤖</span>
        </div>
        <div>
            <h1 class="text-[22px] font-black text-gray-800 tracking-[-0.03em]">AI Auto Agent <span
                    class="text-primary-700">Studio</span></h1>
            <p class="text-[11px] text-gray-500 font-semibold tracking-[0.18em] uppercase">Reasoning Console</p>
        </div>
    </div>

    <div class="hidden md:flex flex-1 items-center justify-center">
        <div class="flex items-center gap-2 px-4 py-2 bg-white/70 rounded-full border border-white/60 shadow-inner">
            <div class="w-2 h-2 bg-primary-500 rounded-full status-dot"></div>
            <span class="text-sm font-medium text-gray-600">系统运行中</span>
        </div>
    </div>

    <div class="flex items-center gap-3">
        <button onclick="toggleRagModal(true)"
                class="flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-primary-800 bg-white/80 border border-white/70 rounded-lg hover:bg-white transition-all shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
            </svg>
            知识库管理
        </button>
        <button onclick="createNewSession()"
                class="flex items-center gap-2 px-4 py-2.5 text-sm font-semibold text-gray-700 bg-white/72 border border-white/70 rounded-lg hover:bg-white transition-all shadow-sm">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            新建对话
        </button>
    </div>
</nav>

<div class="flex-1 flex overflow-hidden p-4 gap-4">
    <aside id="sidebar"
           class="w-64 glass-panel rounded-2xl shadow-xl flex flex-col overflow-hidden hidden md:flex transition-all duration-300">
        <div class="px-5 py-5 border-b border-gray-100 bg-white/60">
            <h2 class="font-bold text-gray-800 flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary-700" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                </svg>
                会话历史
            </h2>
        </div>
        <ul id="chatList" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar bg-white/40">
        </ul>
        <div class="p-3 border-t border-gray-100 bg-white/60">
            <button onclick="clearAllSessions()"
                    class="w-full py-2 text-xs font-medium text-red-500 hover:bg-red-50 rounded-lg transition border border-transparent hover:border-red-100">
                清空所有历史
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden glass-panel rounded-2xl shadow-xl relative">
        <div class="flex-1 flex overflow-hidden relative">

            <div class="w-1/2 flex flex-col border-r border-gray-100 bg-white/50 relative">
                <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="text-xl bg-primary-100 text-primary-800 p-2 rounded-2xl shadow-sm">🧠</span>
                        <div>
                            <div class="text-[11px] uppercase tracking-[0.22em] text-gray-400 font-semibold">Trace
                                View
                            </div>
                            <h3 class="font-bold text-gray-800">Agent 思考与执行日志</h3>
                        </div>
                    </div>
                </div>
                <div id="thinkingMessages" class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar">
                </div>
            </div>

            <div class="w-1/2 flex flex-col bg-white/80 relative">
                <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="text-xl bg-[#efe3d6] text-[#85553c] p-2 rounded-2xl shadow-sm">✦</span>
                        <div>
                            <div class="text-[11px] uppercase tracking-[0.22em] text-gray-400 font-semibold">Response
                                View
                            </div>
                            <h3 class="font-bold text-gray-800">AI 对话</h3>
                        </div>
                    </div>
                </div>
                <div id="resultMessages" class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar pb-6">
                </div>
            </div>
        </div>

        <div class="bg-white border-t border-gray-100 px-5 py-3 rounded-b-2xl relative z-30 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div class="mb-2 flex flex-wrap items-center gap-2.5 bg-white/50 px-3 py-2.5 rounded-[18px] border border-white/60">
                <div class="flex items-center gap-2">
                    <span class="text-primary-700"><svg class="w-4 h-4" fill="none" stroke="currentColor"
                                                        viewBox="0 0 24 24"><path stroke-linecap="round"
                                                                                  stroke-linejoin="round"
                                                                                  stroke-width="2"

<script>
    const BASE_URL = 'http://localhost:8091';
    let isConnected = false;

    // --- 会话状态管理 (Local Storage) ---
    const STORAGE_KEY = 'aiAgentChatSessions_v2';
    let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    let currentSessionId = null;
    let currentRunId = 0;
    let stageCardRuntime = {
        cardMap: {},
        latestByStep: {},
        latestKey: null,
        pendingTokenByStep: {},
        totalTokenKey: null
    };

    const DEFAULT_LEFT_HTML = `
        <div class="flex items-start gap-4 message w-full">
            <div class="w-10 h-10 bg-gradient-to-br from-primary-400 to-primary-600 rounded-xl flex items-center justify-center shadow-md flex-shrink-0"><span class="text-white text-sm font-bold">AI</span></div>
            <div class="flex-1 bg-white border border-gray-100 rounded-2xl rounded-tl-none p-4 shadow-sm text-sm text-gray-700"><strong>系统助手:</strong> 左侧将为您透明展示 Agent 在执行复杂任务时的思考链路与节点调用过程。</div>
        </div>`;
    const DEFAULT_RIGHT_HTML = `
        <div class="flex items-start gap-4 message w-full">
            <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-xl flex items-center justify-center shadow-md flex-shrink-0"><span class="text-white text-sm font-bold">AI</span></div>
            <div class="flex-1 bg-white border border-gray-100 rounded-2xl rounded-tl-none p-4 shadow-sm text-sm text-gray-700"><strong>系统助手:</strong> 您好，我是自动智能体。这里将直接为您呈现对话结果。有什么可以帮您？</div>
        </div>`;

    // 初始化
    window.addEventListener('load', () => {
        marked.setOptions({
            breaks: true, gfm: true, highlight: (code, lang) => {
                try {
                    return hljs.highlightAuto(code).value;
                } catch (e) {
                    return code;
                }
            }
        });
        document.getElementById('messageInput').focus();
        loadRagTags();

        if (Object.keys(sessions).length === 0) {
            createNewSession();
        } else {
            const latestId = Object.keys(sessions).sort((a, b) => sessions[b].updatedAt - sessions[a].updatedAt)[0];
            loadSession(latestId);
        }
    });

    function generateSessionId() {
        return 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 5);
    }

    function createNewSession() {
        currentSessionId = generateSessionId();
        sessions[currentSessionId] = {
            id: currentSessionId,
            title: 'New Chat',
            leftHtml: DEFAULT_LEFT_HTML,
            rightHtml: DEFAULT_RIGHT_HTML,
            updatedAt: Date.now()
        };
        syncToStorage();
        loadSession(currentSessionId);
    }

    function loadSession(id) {
        if (!sessions[id]) return;
        currentSessionId = id;
        resetStageCardRuntime();
        document.getElementById('thinkingMessages').innerHTML = sessions[id].leftHtml;
        document.getElementById('resultMessages').innerHTML = sessions[id].rightHtml;
        document.getElementById('sessionIdDisplay').textContent = 'Session ID: ' + id;
        renderSidebar();
        scrollToBottom('thinkingMessages');
        scrollToBottom('resultMessages');
    }

    function syncDOMToSession() {
        if (!currentSessionId || !sessions[currentSessionId]) return;
        sessions[currentSessionId].leftHtml = document.getElementById('thinkingMessages').innerHTML;
        sessions[currentSessionId].rightHtml = document.getElementById('resultMessages').innerHTML;
        sessions[currentSessionId].updatedAt = Date.now();
        syncToStorage();
    }

    function updateSessionTitle(title) {
        if (sessions[currentSessionId] && sessions[currentSessionId].title === 'New Chat') {
            sessions[currentSessionId].title = title.length > 12 ? title.substring(0, 12) + '...' : title;
            syncToStorage();
            renderSidebar();
        }
    }

    function syncToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function renderSidebar() {
        const list = document.getElementById('chatList');
        list.innerHTML = '';
        const sortedIds = Object.keys(sessions).sort((a, b) => sessions[b].updatedAt - sessions[a].updatedAt);
        sortedIds.forEach(id => {
            const session = sessions[id];
            const isActive = id === currentSessionId;
            const li = document.createElement('li');
            li.className = `p-3 text-sm rounded-xl border shadow-sm cursor-pointer transition ${isActive ? 'bg-primary-50 border-primary-300' : 'bg-white border-gray-100 hover:border-primary-300 hover:shadow-md'}`;
            li.onclick = () => loadSession(id);
            li.innerHTML = `
                <div class="flex justify-between items-center">
                    <div class="font-bold ${isActive ? 'text-primary-700' : 'text-gray-600'} truncate flex-1">${session.title}</div>
                    <button onclick="deleteSession(event, '${id}')" class="text-gray-300 hover:text-red-500 ml-2" title="删除">×</button>
                </div>
                <div class="text-[10px] text-gray-400 mt-1">${new Date(session.updatedAt).toLocaleTimeString()}</div>
            `;
            list.appendChild(li);
        });
    }

    function deleteSession(event, id) {
        event.stopPropagation();
        delete sessions[id];
        syncToStorage();
        if (id === currentSessionId) {
            const keys = Object.keys(sessions);
            if (keys.length > 0) {
                loadSession(keys[0]);
            } else {
                createNewSession();
            }
        } else {
            renderSidebar();
        }
    }

    function clearAllSessions() {
        if (confirm('Confirm clear all chat sessions? This action cannot be undone.')) {
            sessions = {};
            localStorage.removeItem(STORAGE_KEY);
            createNewSession();
        }
    }

    // --- RAG 模块 ---
    async function loadRagTags() {
        const select = document.getElementById('ragSelect');
        try {
            const res = await fetch(`${BASE_URL}/api/v1/rag/tags`);
            const data = await res.json();
            if (data.code === "0000" && data.data) {
                const currentVal = select.value;
                select.innerHTML = '<option value="">-- 不使用知识库 --</option>';
                data.data.forEach(tag => select.innerHTML += `<option value="${tag}">${tag}</option>`);
                if (data.data.includes(currentVal)) select.value = currentVal;
            }
        } catch (e) {
            console.error('Load rag tags failed', e);
        }
    }

    function toggleRagModal(show) {
        const modal = document.getElementById('ragModal'), content = document.getElementById('ragModalContent');
        if (show) {
            modal.classList.replace('modal-leave', 'modal-enter');
            setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
            content.classList.replace('opacity-0', 'opacity-100');
        } else {
            content.classList.replace('scale-100', 'scale-95');
            content.classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => modal.classList.replace('modal-enter', 'modal-leave'), 300);
        }
    }

    function switchTab(tab) {
        document.getElementById('panel-file').classList.toggle('hidden', tab !== 'file');
        document.getElementById('panel-git').classList.toggle('hidden', tab !== 'git');
        document.getElementById('tab-file').className = tab === 'file' ? 'pb-3 px-4 font-bold text-primary-600 border-b-2 border-primary-600 transition' : 'pb-3 px-4 font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent transition';
        document.getElementById('tab-git').className = tab === 'git' ? 'pb-3 px-4 font-bold text-primary-600 border-b-2 border-primary-600 transition' : 'pb-3 px-4 font-medium text-gray-500 hover:text-gray-700 border-b-2 border-transparent transition';
    }

    async function submitFileUpload() {
        const tag = document.getElementById('uploadRagTag').value.trim(),
            files = document.getElementById('uploadFile').files;
        if (!tag || files.length === 0) return alert('请填写标识并选择文件');
        const btn = document.getElementById('uploadBtn');
        btn.disabled = true;
        btn.innerHTML = '解析中...';
        const formData = new FormData();
        formData.append('knowledgeTag', tag);
        for (let file of files) formData.append('files', file);
        try {
            const res = await fetch(`${BASE_URL}/api/v1/rag/knowledge/files`, {method: 'POST', body: formData}),
                data = await res.json();
            if (data.code === "0000") {
                alert('Build success');
                toggleRagModal(false);
                loadRagTags();
                setTimeout(() => document.getElementById('ragSelect').value = tag, 500);
            } else alert('失败: ' + data.info);
        } catch (e) {
            alert('网络异常');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '上传并向量化';
        }
    }

    // --- 核心聊天发送流 ---
    function sendMessage() {
        const msgInput = document.getElementById('messageInput'), message = msgInput.value.trim();
        if (!message) return;
        if (isConnected) return alert('Agent 执行中，请稍候...');
        resetStageCardRuntime();

        // 1. 打印用户问题到右侧聊天框 (纯净UI)
        addRightChatMessage(message, 'user');

        // 2. 左侧仅附加一条小日志，不清空原有思考过程
        appendLeftLog(`【指令】触发新任务拆解执行`);

        updateSessionTitle(message);
        msgInput.value = '';
        document.getElementById('sendBtn').disabled = true;

        // 显示右侧聊天打字等待动画
        showChatLoading();

        const requestData = {
            aiAgentId: document.getElementById('aiAgentSelect').value,
            message: message,
            sessionId: currentSessionId, // 延续当前 Session
            maxStep: parseInt(document.getElementById('maxStepSelect').value),
            knowledgeName: document.getElementById('ragSelect').value
        };

        fetch(`${BASE_URL}/api/v1/agent/auto_agent`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Accept': 'text/event-stream'},
            body: JSON.stringify(requestData)
        }).then(response => {
            if (!response.ok) throw new Error('网络异常');
            const reader = response.body.getReader(), decoder = new TextDecoder();
            isConnected = true;

            function readStream() {
                reader.read().then(({done, value}) => {
                    if (done) {
                        endStream();
                        return;
                    }
                    const chunk = decoder.decode(value, {stream: true}), lines = chunk.split('\n');
                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.substring(6).trim();
                            if (data && data !== '[DONE]') {
                                try {
                                    handleSSEMessage(JSON.parse(data));
                                } catch (e) {
                                    handleSSEMessage({type: 'error', content: data});
                                }
                            }
                        }
                    }
                    readStream();
                }).catch(err => endStream('中断'));
            }

            readStream();
        }).catch(err => endStream(err.message));
    }

    function handleSSEMessage(jsonData) {
        const {type, subType, step, content} = jsonData;
        if (!content || content.trim() === '') return;

        // 【右侧纯净逻辑】：只有最终的完整 summary 才打印在右侧
        if (type === 'summary' && !subType) {
            hideChatLoading(); // 隐藏等待动画
            addRightChatMessage(content, 'ai');
        } else if (type === 'error') {
            hideChatLoading();
            addRightChatMessage(`**系统提示:** 执行出现异常\n${content}`, 'ai');
            addLeftStageMessage(type, subType, content, step);
        } else if (type !== 'complete') {
            // 所有其它的思考过程、子结果，都在左边日志流中展示
            addLeftStageMessage(type, subType, content, step);
        }
    }

    function endStream(err) {
        isConnected = false;
        document.getElementById('sendBtn').disabled = false;
        hideChatLoading();
        if (err) addLeftStageMessage('error', null, '连接失败: ' + err, null);
        syncDOMToSession(); // 数据流结束，保存当前完整DOM
    }

    // --- UI 渲染控制 ---
    const stageTypeMap = {
        analysis: {
            name: 'Analysis',
            icon: 'A',
            class: 'stage-analysis',
            shellClass: 'stage-analysis-shell',
            avatarClass: 'stage-avatar-analysis'
        },
        execution: {
            name: 'Execution',
            icon: 'E',
            class: 'stage-execution',
            shellClass: 'stage-execution-shell',
            avatarClass: 'stage-avatar-execution'
        },
        supervision: {
            name: 'Supervision',
            icon: 'S',
            class: 'stage-supervision',
            shellClass: 'stage-supervision-shell',
            avatarClass: 'stage-avatar-supervision'
        },
        summary: {
            name: 'Summary',
            icon: 'R',
            class: 'stage-summary',
            shellClass: 'stage-summary-shell',
            avatarClass: 'stage-avatar-summary'
        },
        error: {
            name: 'Error',
            icon: '!',
            class: 'stage-error',
            shellClass: 'stage-error-shell',
            avatarClass: 'stage-avatar-error'
        },
        token: {
            name: 'Token',
            icon: 'T',
            class: 'stage-token',
            shellClass: 'stage-token-shell',
            avatarClass: 'stage-avatar-token'
        }
    };
    const subTypeMap = {
        analysis_status: 'Status',
        analysis_round: 'Round',
        analysis_current_task: 'Current Task',
        analysis_last_supervision: 'Last Supervision',
        analysis_last_execution: 'Last Execution',
        analysis_sanitized_goal: 'Sanitized Goal',
        analysis_step_plan: 'Step Plan',
        analysis_strategy: 'Strategy',
        execution_plan_read: 'Plan Read',
        execution_understanding: 'Understanding',
        execution_tool_decision: 'Tool Decision',
        execution_target: 'Target',
        execution_process: 'Process',
        execution_result: 'Result',
        execution_evidence: 'Evidence',
        execution_quality: 'Quality',
        execution_raw_output: 'Raw Output',
        assessment: 'Assessment',
        issues: 'Issues',
        suggestions: 'Suggestions',
        score: 'Score',
        pass: 'Pass',
        decision: 'Decision',
        supervision_plan_ref: 'Plan Ref',
        supervision_execution_ref: 'Execution Ref',
        supervision_decision: 'Decision',
        completed_work: 'Completed',
        client_usage: 'Client usage',
        total_usage: 'Total usage'
    };

    function parseJsonContent(text) {
        try {
            return JSON.parse(text);
        } catch (_) {
            return null;
        }
    }

    function resetStageCardRuntime() {
        currentRunId += 1;
        stageCardRuntime = {
            cardMap: {},
            latestByStep: {},
            latestKey: null,
            pendingTokenByStep: {},
            totalTokenKey: null
        };
    }

    function getStageCardKey(type, step) {
        return `${currentRunId}::${type || 'unknown'}::${step || 'NA'}`;
    }

    function buildTokenBadgeHtml(tokenInfo) {
        if (!tokenInfo || tokenInfo.usageMissing) {
            return `<span class="token-item token-na">Token N/A</span>`;
        }
        const inputTokens = tokenInfo.inputTokens ?? 0;
        const outputTokens = tokenInfo.outputTokens ?? 0;
        const totalTokens = tokenInfo.totalTokens ?? (inputTokens + outputTokens);
        return `
            <span class="token-item token-in"><span class="token-label">INPUT</span><span class="token-value">${inputTokens}</span></span>
            <span class="token-item token-out"><span class="token-label">OUTPUT</span><span class="token-value">${outputTokens}</span></span>
            <span class="token-item token-total"><span class="token-label">TOTAL</span><span class="token-value">${totalTokens}</span></span>`;
    }

    function ensureStageCard(type, step) {
        const key = getStageCardKey(type, step);
        if (stageCardRuntime.cardMap[key]) return stageCardRuntime.cardMap[key];

        const container = document.getElementById('thinkingMessages');
        const stage = stageTypeMap[type] || {
            name: type,
            icon: 'I',
            class: 'stage-analysis',
            shellClass: 'stage-analysis-shell',
            avatarClass: 'stage-avatar-analysis'
        };
        let indicators = `<span class="stage-indicator ${stage.class}"><span class="stage-indicator-icon">${stage.icon}</span><span>${stage.name}</span></span>`;
        if (step) indicators += `<span class="sub-type-indicator">Step 0${step}</span>`;

        const wrapper = document.createElement('div');
        wrapper.className = 'flex items-start gap-3 message w-full';
        wrapper.innerHTML = `
            <div class="stage-avatar ${stage.avatarClass}"><span>${stage.icon}</span></div>
            <div class="stage-card-shell ${stage.shellClass} flex-1 rounded-xl rounded-tl-none p-4 max-w-[90%]">
                <div class="stage-card-topbar">
                    <div class="stage-card-meta">
                        <div class="stage-card-chipline">${indicators}</div>
                        <div class="token-usage-indicator hidden"></div>
                    </div>
                </div>
                <div class="stage-subcards"></div>
            </div>`;
        container.appendChild(wrapper);

        const record = {
            key,
            subCardMap: {},
            subCardsEl: wrapper.querySelector('.stage-subcards'),
            tokenEl: wrapper.querySelector('.token-usage-indicator')
        };
        stageCardRuntime.cardMap[key] = record;
        if (step) stageCardRuntime.latestByStep[step] = key;
        stageCardRuntime.latestKey = key;

        const pendingToken = (step && stageCardRuntime.pendingTokenByStep[step])
            ? stageCardRuntime.pendingTokenByStep[step]
            : null;
        if (pendingToken) {
            setTokenOnStageCard(record, pendingToken);
            delete stageCardRuntime.pendingTokenByStep[step];
        }

        return record;
    }

    function ensureTotalTokenCard() {
        if (stageCardRuntime.totalTokenKey && stageCardRuntime.cardMap[stageCardRuntime.totalTokenKey]) {
            return stageCardRuntime.cardMap[stageCardRuntime.totalTokenKey];
        }

        const container = document.getElementById('thinkingMessages');
        const indicators = `
            <span class="stage-indicator stage-token"><span class="stage-indicator-icon">T</span><span>Token</span></span>
            <span class="sub-type-indicator">Run Total</span>`;

        const wrapper = document.createElement('div');
        wrapper.className = 'stage-total-card flex items-start gap-3 message w-full';
        wrapper.innerHTML = `
            <div class="stage-avatar stage-avatar-token"><span>Σ</span></div>
            <div class="stage-card-shell stage-token-shell flex-1 rounded-xl rounded-tl-none p-4 max-w-[90%]">
                <div class="stage-card-topbar">
                    <div class="stage-card-meta">
                        <div class="stage-card-chipline">${indicators}</div>
                        <div class="token-usage-indicator hidden"></div>
                    </div>
                </div>
                <div class="stage-subcards"></div>
            </div>`;
        container.appendChild(wrapper);

        const key = `${currentRunId}::token::total_usage`;
        const record = {
            key,
            subCardMap: {},
            subCardsEl: wrapper.querySelector('.stage-subcards'),
            tokenEl: wrapper.querySelector('.token-usage-indicator')
        };
        stageCardRuntime.cardMap[key] = record;
        stageCardRuntime.totalTokenKey = key;
        return record;
    }

    function upsertStageSubCard(record, subType, content) {
        const subKey = subType || 'detail';
        const subName = subType ? (subTypeMap[subType] || subType) : 'Detail';

        if (!record.subCardMap[subKey]) {
            const subCard = document.createElement('div');
            subCard.className = 'stage-subcard';
            subCard.innerHTML = `
                <div class="stage-subcard-title">${subName}</div>
                <div class="stage-subcard-content markdown-content text-sm"></div>`;
            record.subCardsEl.appendChild(subCard);
            record.subCardMap[subKey] = {contentEl: subCard.querySelector('.stage-subcard-content'), lastContent: ''};
        }

        const subRecord = record.subCardMap[subKey];
        if (subRecord.lastContent === content) return;
        subRecord.contentEl.innerHTML = marked.parse(content);
        subRecord.lastContent = content;
    }

    function setTokenOnStageCard(record, tokenInfo) {
        if (!record || !record.tokenEl) return;
        record.tokenEl.innerHTML = buildTokenBadgeHtml(tokenInfo);
        record.tokenEl.title = tokenInfo.usageMissing
            ? 'Model did not return token usage'
            : `IN ${tokenInfo.inputTokens ?? 0}, OUT ${tokenInfo.outputTokens ?? 0}, TOTAL ${tokenInfo.totalTokens ?? 0}`;
        record.tokenEl.classList.remove('hidden');
    }

    function applyTokenToStageCard(content, step, subType) {
        const tokenInfo = parseJsonContent(content);
        if (!tokenInfo) return;

        if (subType === 'total_usage') {
            const totalRecord = ensureTotalTokenCard();
            setTokenOnStageCard(totalRecord, tokenInfo);
            return;
        }

        const key = (step && stageCardRuntime.latestByStep[step]) ? stageCardRuntime.latestByStep[step] : stageCardRuntime.latestKey;
        if (!key) {
            if (step) stageCardRuntime.pendingTokenByStep[step] = tokenInfo;
            return;
        }

        const record = stageCardRuntime.cardMap[key];
        setTokenOnStageCard(record, tokenInfo);
    }

    // 右侧纯净聊天气泡渲染
    function addRightChatMessage(text, role) {
        const container = document.getElementById('resultMessages');
        const isUser = role === 'user';
        const html = `
            <div class="flex items-start gap-4 message w-full ${isUser ? 'flex-row-reverse' : ''}">
                <div class="w-10 h-10 bg-gradient-to-br ${isUser ? 'from-gray-700 to-gray-900' : 'from-green-400 to-green-600'} rounded-xl flex items-center justify-center shadow-md flex-shrink-0">
                    <span class="text-white text-sm font-bold">${isUser ? 'Me' : 'AI'}</span>
                </div>
                <div class="flex-1 ${isUser ? 'bg-primary-50 border border-primary-100' : 'bg-white border border-gray-100'} rounded-2xl ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'} p-5 shadow-sm max-w-[85%]">
                    <div class="${isUser ? 'text-sm text-gray-800 font-medium user-message-text' : 'markdown-content'}">${isUser ? text.replace(/\n/g, '<br>') : marked.parse(text)}</div>
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
        if (!isUser) container.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
        scrollToBottom('resultMessages');
        syncDOMToSession();
    }

    // 左侧日志气泡渲染
    function addLeftStageMessage(type, subType, content, step) {
        if (type === 'token') {
            applyTokenToStageCard(content, step, subType);
            scrollToBottom('thinkingMessages');
            return;
        }

        const record = ensureStageCard(type, step);
        upsertStageSubCard(record, subType, content);
        scrollToBottom('thinkingMessages');
    }

    // 左侧极简文本分割线
    function appendLeftLog(text) {
        const html = `<div class="w-full text-center my-4"><span class="bg-gray-100 text-gray-400 text-xs px-3 py-1 rounded-full">${text}</span></div>`;
        document.getElementById('thinkingMessages').insertAdjacentHTML('beforeend', html);
    }

    // 右侧打字动画
    function showChatLoading() {
        const container = document.getElementById('resultMessages');
        const html = `
            <div id="chat-loading" class="flex items-start gap-4 message w-full">
                <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-xl flex items-center justify-center shadow-md flex-shrink-0"><span class="text-white text-sm font-bold">AI</span></div>
                <div class="bg-transparent p-3 flex items-center gap-1.5 mt-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
        scrollToBottom('resultMessages');
    }

    function hideChatLoading() {
        const el = document.getElementById('chat-loading');
        if (el) el.remove();
    }

    function scrollToBottom(id) {
        const el = document.getElementById(id);
        if (el) el.scrollTop = el.scrollHeight;
    }

    document.getElementById('messageInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    document.getElementById('exampleSelect').addEventListener('change', function () {
        if (this.value) {
            document.getElementById('messageInput').value = this.value;
            this.value = '';
        }
    });

    // --- Git 仓库解析 ---
    async function submitGitAnalysis() {
        const repoUrl = document.getElementById('gitRepoUrl').value.trim();
        const userName = document.getElementById('gitUserName').value.trim();
        const token = document.getElementById('gitToken').value.trim();
        if (!repoUrl) return alert('请输入 Git 仓库地址');

        const btn = document.getElementById('gitAnalyzeBtn');
        btn.disabled = true;
        btn.innerHTML = '克隆分析中...(可能需要较长时间...)';

        const payload = {
            repoUrl,
            userName: userName || '',
            token: token || ''
        };

        try {
            const res = await fetch(`${BASE_URL}/api/v1/rag/knowledge/git`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.code === "0000") {
                alert('Git 代码库分析完成并向量化成功！');
                toggleRagModal(false);
                loadRagTags();
            } else {
                alert('失败: ' + data.info);
            }
        } catch (e) {
            alert('Network error or parse timeout');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Clone and analyze';
        }
    }
</script>
</body>
</html>
